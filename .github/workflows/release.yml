name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # [x.y.z] セクションの本文を抽出（次の ## まで）
          NOTES=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="リリースノートは CHANGELOG.md を参照してください。"
          fi
          # multiline output
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Filer ${{ github.ref_name }}"
          releaseBody: |
            ${{ steps.changelog.outputs.notes }}

            ---

            ### インストール方法
            - **MSI**: `.msi` をダウンロードして実行
            - **EXE**: `-setup.exe` をダウンロードして実行

            ### 動作環境
            - Windows 10/11 (64bit)
          releaseDraft: false
          prerelease: false

      - name: Upload to Cloudflare R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ENDPOINT="https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          aws s3 cp "src-tauri/target/release/bundle/nsis/TomaFiler_${VERSION}_x64-setup.exe" \
            "s3://filer/TomaFiler_${VERSION}_x64-setup.exe" --endpoint-url "$ENDPOINT"
          aws s3 cp "src-tauri/target/release/bundle/msi/TomaFiler_${VERSION}_x64_en-US.msi" \
            "s3://filer/TomaFiler_${VERSION}_x64_en-US.msi" --endpoint-url "$ENDPOINT"
