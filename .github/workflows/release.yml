name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Filer ${{ github.ref_name }}"
          releaseBody: |
            ## Filer ${{ github.ref_name }}

            ### インストール方法
            - **MSI**: `Filer_x.x.x_x64_ja-JP.msi` をダウンロードして実行
            - **EXE**: `Filer_x.x.x_x64-setup.exe` をダウンロードして実行

            ### 動作環境
            - Windows 10/11 (64bit)
          releaseDraft: false
          prerelease: false
